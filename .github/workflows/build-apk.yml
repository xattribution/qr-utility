name: Build APK

# Builds an installable debug APK on GitHub's servers.
# Run it: push this project to a GitHub repo, open the Actions tab,
# select "Build APK" -> "Run workflow". When it finishes, download the
# "qr-utility-debug-apk" artifact from the run summary.

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qr-utility-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
