# QR Utility — static site + APK download
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # never cache the metadata so a rebuilt container shows fresh info immediately
    location = /version.json {
        add_header Cache-Control "no-store";
        default_type application/json;
    }

    # serve the compiled APK as a proper Android package download
    location = /download/qr-utility.apk {
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment; filename="qr-utility.apk"';
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
